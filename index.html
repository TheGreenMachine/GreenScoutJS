<!doctype html>
<html lang="en">
  <head>
    <!-- Standard favicon -->
    <link rel="icon" href="/src/assets/favicon/favicon.ico" sizes="any" />
    <!-- For Apple devices -->
    <link
      rel="apple-touch-icon"
      href="/src/assets/favicon/apple-touch-icon.png"
    />
    <!-- General fallback for older browsers -->
    <link
      rel="icon"
      type="image/png"
      href="/src/assets/favicon/favicon-32x32.png"
      sizes="32x32"
    />
    <script>
      const theme = localStorage.getItem("app-theme") ?? "Green";
      document.documentElement.dataset.theme = theme;

      const animated = localStorage.getItem("app-theme-animated") ?? "0";
      document.documentElement.dataset.animated = animated;
    </script>

    <script type="module">
      import { getIsOffline } from "./src/api";

      const link = document.createElement("link");
      link.id = "dynamic-theme";
      link.rel = "stylesheet";
      link.href = `/GreenScoutJS/themes/${localStorage.getItem("app-theme") ?? "green"}.css`;
      document.head.appendChild(link);

      const offline = (getIsOffline() ? "1" : "0") ?? "0";
      document.documentElement.dataset.offline = offline;
    </script>

    <title>Green Scout</title>
  </head>
  <body style="padding: 0; margin: 0; color: var(--background-color)">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
